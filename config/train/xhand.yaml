hydra:
  run:
    dir: ${log_dir}
_target_: src.agent.train_unicod.TrainAgent

log_dir: ${oc.env:VLA_LOG_DIR}/train/${name}/${now:%Y-%m-%d}_${now:%H-%M}_${seed}
name: xhand_tp${horizon_steps}_${flow_sampling}
device: cuda
n_nodes: 1
seed: 42
pretrained_model_path: ${oc.env:TRANSFORMERS_CACHE}
load_pretrained_weights: True
resume_checkpoint_path:
train_vlm: True
action_expert_adaptive_mode:  # adaLN, adaLN-Zero, or None
use_torch_compile: True
use_bf16: True
use_amp: True
quantize: False
lora: False
lora_r: 32
lora_dropout: 0.0
debug: False
dino_model_path: /mnt/bn/model/models--facebook--dinov3-vit7b16-pretrain-lvd1689m/snapshots/b5d0cb0595d54b19d87477cce855d0fd055d51ff
ego3d_patch_reso: 2
n_freqs: 8
use_3d: False
pred_siglip: True
train_action: True
use_linear_encoder: True
use_gripper: True

use_ema: False
ema_decay: 0.99
ema_start: ${save_model_start}
ema_freq: 1
ema_device: cuda
use_swa: False
swa_start: ${eval:'1550000 // ${global_batch_size} * 5'}
swa_freq: ${eval:'1550000 // ${global_batch_size} // 4'}
swa_device: cpu

data_json_path: /cephfs/cjyao/data/opensource_robotdata/annotation_all/0413_xbot_interval1
data_root_path: /cephfs/cjyao/data/opensource_robotdata
root_data_dir: /cephfs/cjyao/data/opensource_robotdata
lang_folder: lang_clip_resnet50
num_workers: 8
slurm: false
min_window_size: 21 # 21
max_window_size: 50
future_range: 29
img_gen_frame_diff: 3
benchmark_name: xhand # calvin_abcd
act_seq_len: 8
obs_seq_len: 1
window_sampling_strategy: 'geometric'

dataset_args:
  ########### debug/lora ################
  debug: False
  batch_size: 8
  shuffle: True
  num_workers: 4
  video_size: [256,256]

